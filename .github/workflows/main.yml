name: Mac-RDP

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Install & Configure ngrok
        run: |
          brew install ngrok
          ngrok authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

      - name: Install XRDP (RDP Server)
        run: |
          # Install xrdp and the XQuartz window system
          brew install --cask xquartz
          brew install xrdp

      - name: Create RDP User
        run: |
          # Create a fresh user to avoid 'old password' permission issues
          sudo dscl . -delete /Users/rdpuser || true
          sudo dscl . -create /Users/rdpuser
          sudo dscl . -create /Users/rdpuser UserShell /bin/zsh
          sudo dscl . -create /Users/rdpuser RealName "RDP User"
          sudo dscl . -create /Users/rdpuser UniqueID 701
          sudo dscl . -create /Users/rdpuser PrimaryGroupID 20
          sudo dscl . -create /Users/rdpuser NFSHomeDirectory /Users/rdpuser
          sudo dscl . -passwd /Users/rdpuser "P@ssw0rd!"
          sudo dscl . -append /Groups/admin GroupMembership rdpuser
          sudo mkdir -p /Users/rdpuser
          sudo chown rdpuser:staff /Users/rdpuser

      - name: Start RDP Service
        run: |
          # Start the xrdp server on the default RDP port 3389
          sudo xrdp
          sudo xrdp-sesman
          sleep 5

      - name: Start ngrok Tunnel
        run: |
          # Tunnel the RDP port 3389
          ngrok tcp 3389 --log=stdout > ngrok.log &
          sleep 10

      - name: Get RDP Address
        run: |
          URL=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url')
          echo "------------------------------------------------------------"
          if [ -z "$URL" ] || [ "$URL" == "null" ]; then
            echo "ERROR: ngrok failed to start. Check your Token."
          else
            # Remove the 'tcp://' prefix for standard RDP clients
            CLEAN_URL=$(echo $URL | sed 's/tcp:\/\///')
            echo "Your RDP Address: $CLEAN_URL"
            echo "Username: rdpuser"
            echo "Password: P@ssw0rd!"
          fi
          echo "------------------------------------------------------------"

      - name: Keep Alive
        run: |
          while true; do sleep 60; done
