name: Mac-VNC

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Install & Configure ngrok
        run: |
          brew install ngrok
          ngrok authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

      - name: Enable Screen Sharing (VNC)
        run: |
          # Use sysadminctl to set the password (bypasses the 'old password' prompt)
          sudo sysadminctl -adminUser runner -adminPassword "" -password "P@ssw0rd!"
          
          # Enable Screen Sharing in the system overrides
          sudo defaults write /var/db/launchd.db/com.apple.launchd/overrides.plist com.apple.screensharing -dict Disabled -bool false
          
          # Load the Screen Sharing daemon
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist
          
          # Give the OS a moment to start the service
          sleep 5

      - name: Start ngrok Tunnel
        run: |
          # Start ngrok in the background and log output to a file
          ngrok tcp 5900 --log=stdout > ngrok.log &
          sleep 10

      - name: Get VNC Address
        run: |
          # Fetch the public URL from the local ngrok API
          URL=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url')
          echo "------------------------------------------------------------"
          if [ -z "$URL" ] || [ "$URL" == "null" ]; then
            echo "Error: ngrok tunnel failed to start. Check your Auth Token."
          else
            echo "Your VNC Address is: $URL"
            echo "Username: runner"
            echo "Password: P@ssw0rd!"
          fi
          echo "------------------------------------------------------------"

      - name: Keep Alive
        run: |
          # Prevents the GitHub Action from finishing and closing the connection
          while true; do sleep 60; done
