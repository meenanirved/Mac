name: Mac-VNC-NewUser

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Install & Configure ngrok
        run: |
          brew install ngrok
          ngrok authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

      - name: Create New Admin & Enable VNC
        run: |
          # 1. Create a new admin user called 'admin'
          # This avoids the 'old password' error on the default 'runner' account
          sudo dscl . -create /Users/admin
          sudo dscl . -create /Users/admin UserShell /bin/zsh
          sudo dscl . -create /Users/admin RealName "Admin"
          sudo dscl . -create /Users/admin UniqueID 501
          sudo dscl . -create /Users/admin PrimaryGroupID 20
          sudo dscl . -create /Users/admin NFSHomeDirectory /Users/admin
          sudo dscl . -passwd /Users/admin "P@ssw0rd!"
          sudo dscl . -append /Groups/admin GroupMembership admin
          sudo dscl . -append /Groups/procmod GroupMembership admin
          sudo dscl . -append /Groups/procview GroupMembership admin
          sudo mkdir -p /Users/admin
          sudo chown admin:staff /Users/admin

          # 2. Enable VNC with Legacy Support
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
          -activate -configure -access -on \
          -clientopts -setvnclegacy -vnclegacy yes \
          -clientopts -setvncpw -vncpw "P@ssw0rd!" \
          -restart -agent -privs -all

          # 3. Grant full permissions specifically to our new 'admin' user
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
          -configure -users admin -access -on -privs -all

          # 4. Security Bypass for RealVNC
          sudo defaults write /Library/Preferences/com.apple.VNCSettings.txt SecurityConfiguration -dict PrefsCauseSecurityUpgrade -bool false
          
          sleep 5

      - name: Start ngrok Tunnel
        run: |
          ngrok tcp 5900 --log=stdout > ngrok.log &
          sleep 10

      - name: Get VNC Address
        run: |
          URL=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url')
          echo "------------------------------------------------------------"
          echo "Your VNC Address: $URL"
          echo "Username: admin"
          echo "Password: P@ssw0rd!"
          echo "------------------------------------------------------------"

      - name: Keep Alive
        run: |
          while true; do sleep 60; done
