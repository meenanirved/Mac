name: Mac-VNC-Final-v2

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Install & Configure ngrok
        run: |
          brew install ngrok
          ngrok authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

      - name: Force Enable Screen Sharing (VNC)
        run: |
          # 1. THE ULTIMATE PASSWORD RESET (No-fail method)
          # This forces the password without asking for the old one
          sudo dscl . -passwd /Users/runner "P@ssw0rd!"

          # 2. Enable VNC with Legacy Support
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
          -activate -configure -access -on \
          -clientopts -setvnclegacy -vnclegacy yes \
          -clientopts -setvncpw -vncpw "P@ssw0rd!" \
          -restart -agent -privs -all

          # 3. FORCE VNC LOGIN PERMISSIONS
          # This tells macOS to allow the 'runner' user to log in remotely
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
          -configure -users runner -access -on -privs -all

          # 4. CRITICAL FIX FOR AUTHENTICATION ERROR
          # This tells the VNC server NOT to require a security upgrade (Legacy Mode)
          sudo defaults write /Library/Preferences/com.apple.VNCSettings.txt SecurityConfiguration -dict PrefsCauseSecurityUpgrade -bool false
          
          sleep 5

      - name: Start ngrok Tunnel
        run: |
          ngrok tcp 5900 --log=stdout > ngrok.log &
          sleep 10

      - name: Get VNC Address
        run: |
          URL=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url')
          echo "------------------------------------------------------------"
          echo "Your VNC Address: $URL"
          echo "Username: runner"
          echo "Password: P@ssw0rd!"
          echo "------------------------------------------------------------"

      - name: Keep Alive
        run: |
          while true; do sleep 60; done
