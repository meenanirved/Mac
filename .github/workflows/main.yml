name: Mac-VNC-UniqueUser

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Install & Configure ngrok
        run: |
          brew install ngrok
          ngrok authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

      - name: Create VNC User & Enable Screen Sharing
        run: |
          # 1. Create a unique user 'vncuser'
          # We delete it first to ensure a clean start if re-running
          sudo dscl . -delete /Users/vncuser || true
          
          sudo dscl . -create /Users/vncuser
          sudo dscl . -create /Users/vncuser UserShell /bin/zsh
          sudo dscl . -create /Users/vncuser RealName "VNC User"
          sudo dscl . -create /Users/vncuser UniqueID 601
          sudo dscl . -create /Users/vncuser PrimaryGroupID 20
          sudo dscl . -create /Users/vncuser NFSHomeDirectory /Users/vncuser
          sudo dscl . -passwd /Users/vncuser "P@ssw0rd!"
          sudo dscl . -append /Groups/admin GroupMembership vncuser
          sudo mkdir -p /Users/vncuser
          sudo chown vncuser:staff /Users/vncuser

          # 2. Enable VNC with Legacy Support
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
          -activate -configure -access -on \
          -clientopts -setvnclegacy -vnclegacy yes \
          -clientopts -setvncpw -vncpw "P@ssw0rd!" \
          -restart -agent -privs -all

          # 3. Grant full permissions to 'vncuser'
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
          -configure -users vncuser -access -on -privs -all

          # 4. Security Bypass for RealVNC
          sudo defaults write /Library/Preferences/com.apple.VNCSettings.txt SecurityConfiguration -dict PrefsCauseSecurityUpgrade -bool false
          
          sleep 5

      - name: Start ngrok Tunnel
        run: |
          ngrok tcp 5900 --log=stdout > ngrok.log &
          sleep 10

      - name: Get VNC Address
        run: |
          URL=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url')
          echo "------------------------------------------------------------"
          echo "Your VNC Address: $URL"
          echo "Username: vncuser"
          echo "Password: P@ssw0rd!"
          echo "------------------------------------------------------------"

      - name: Keep Alive
        run: |
          while true; do sleep 60; done
